name: Manual Forecast

on:
  workflow_dispatch:
    inputs:
      year:
        description: 'Forecast year'
        required: true
        default: '2025'
      months:
        description: 'Number of months to forecast'
        required: false
        default: '12'

jobs:
  forecast:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run forecast
        run: |
          python -m src.forecast \
            --monthly-csv data/processed/monthly_hotspot_sum.csv \
            --models-dir models \
            --output-dir data/forecasts \
            --year ${{ github.event.inputs.year }} \
            --months ${{ github.event.inputs.months }}

      - name: Commit forecast results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/forecasts/
          git diff --cached --quiet || git commit -m "ci: forecast ${{ github.event.inputs.year }} [$(date +%Y-%m-%d)]"
          git push
